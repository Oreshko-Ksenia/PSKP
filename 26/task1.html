<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WASM Calculator</title>
</head>
<body>
    <h1>WASM</h1>
    <p>sum(3,4) = <span id="rsum"></span></p>
    <p>sub(3,4) = <span id="rsub"></span></p>
    <p>mul(3,4) = <span id="rmul"></span></p>

    <script>
         let wasmCode = new Uint8Array([
            0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00,
            0x01, 0x0c, 0x02, 0x60, 0x02, 0x7f, 0x7f, 0x01,
            0x7f, 0x60, 0x02, 0x7f, 0x7f, 0x01, 0x7f, 0x03,
            0x03, 0x02, 0x00, 0x01, 0x07, 0x15, 0x03, 0x03,
            0x73, 0x75, 0x6d, 0x00, 0x00, 0x03, 0x6d, 0x75, 0x6c, 0x00, 0x01, 0x03,
            0x73, 0x75, 0x62, 0x00, 0x02, 0x0a, 0x1e, 0x03, 0x09, 0x00, 0x20, 0x00, 0x20, 0x01,
            0x6a, 0x0b, 0x0a, 0x00, 0x20, 0x00, 0x20, 0x01, 0x6c, 0x0b, 0x08, 0x00, 0x20, 0x00,
            0x20, 0x01, 0x6b, 0x0b, 0x00, 0x19, 0x01, 0x01, 0x05, 0x01, 0x01, 0x01, 0x02, 0x00,
            0x01, 0x00, 0x09, 0x01, 0x01, 0x01, 0x00, 0x04, 0x40, 0x00, 0x0b
        ]);

        let wasmImports = {};

        let wasmModule = new WebAssembly.Module(wasmCode);

        let wasmInstance = new WebAssembly.Instance(wasmModule, wasmImports);

        const { sum, sub, mul } = wasmInstance.exports;

        document.getElementById('rsum').textContent = sum(3, 4);  
        document.getElementById('rsub').textContent = sub(3, 4);  
        document.getElementById('rmul').textContent = mul(3, 4);   
    </script>
</body>
</html>
